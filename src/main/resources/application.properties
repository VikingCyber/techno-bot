# Telegram Bot Configuration
bot.token=${TELEGRAM_BOT_TOKEN:}
bot.username=${TELEGRAM_BOT_USERNAME:TechnoTrackerBot}

# NATS Configuration
nats.url=${NATS_URL:nats://localhost:4222}
nats.subject=${NATS_SUBJECT:technotracker.events}
nats.requestSubject=${NATS_REQUEST_SUBJECT:technotracker.requests}
# Disable NATS by default so the app can run locally without a NATS server.
# Set to true to enable connecting to NATS.
nats.enabled=${NATS_ENABLED:true}
nats.requests-updated-subject=${NATS_REQUESTS_UPDATED_SUBJECT:requests.updated}

# Transactional Outbox (при false — публикация в NATS сразу после сохранения в БД)
app.outbox.enabled=${OUTBOX_ENABLED:true}
app.outbox.poll-ms=5000

# DB (H2 file; use spring.datasource.url for PostgreSQL in prod)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/telegram_bot}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:telegram_bot}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:telegram_bot}
spring.jpa.hibernate.ddl-auto=update
# schema.sql в resources — только справочник; таблицы создаёт Hibernate
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.technotracker.bot=DEBUG

