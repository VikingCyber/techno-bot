# Telegram Bot Configuration
bot.token=your_token
bot.username=TechnoTrackerBot

# NATS Configuration
nats.url=${NATS_URL:nats://localhost:4222}
nats.subject=${NATS_SUBJECT:technotracker.events}
nats.requestSubject=${NATS_REQUEST_SUBJECT:technotracker.requests}
# Disable NATS by default so the app can run locally without a NATS server.
# Set to true to enable connecting to NATS.
nats.enabled=${NATS_ENABLED:false}

# Logging
logging.level.root=INFO
logging.level.com.technotracker.bot=DEBUG

