version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: technotracker-telegram-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - NATS_SUBJECT=${NATS_SUBJECT:-technotracker.events}
      - NATS_REQUEST_SUBJECT=${NATS_REQUEST_SUBJECT:-technotracker.requests}
    volumes:
      - ./logs:/app/logs
    depends_on:
      - nats
    networks:
      - technotracker-network

  nats:
    image: nats:2.10-alpine
    container_name: technotracker-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    networks:
      - technotracker-network

networks:
  technotracker-network:
    driver: bridge







